<h2>Créer un convoi</h2>

<form id="convoyForm">

<input id="entrepriseDepart" placeholder="Entreprise départ">

<input id="depart" placeholder="Ville départ">

<input id="entrepriseArrivee" placeholder="Entreprise arrivée">

<input id="arrivee" placeholder="Ville arrivée">

<input id="date" placeholder="Date">

<input id="heure" placeholder="Heure">

<input id="serveur" placeholder="Serveur TMP">

<label>Image du convoi</label>

<input id="convoyImage" type="file" accept="image/*">

<button type="submit">Créer le convoi</button>

</form>

<script src="script.js"></script>
